Claudien Mazimpaka<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href=
  "https://cdnjs.cloudflare.com/ajax/libs/
font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <img
      src="https://images.aimecol.com/uploads/
large/emy-00892_691c4620cb91d_large.jpg"
      alt="Profile photo">

    <h1>Alex Rivera</h1>

    <p class="role">
      <i class="fa-solid fa-laptop-code"></i>
      Frontend Developer
    </p>

    <p class="bio">I love building clean, accessible
    websites and learning new things every day.</p>

    <a href="#" class="btn">
      <i class="fa-solid fa-envelope"></i>
      Contact me
    </a>

    <div class="socials">
      <a href="#" title="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="#" title="Twitter / X">
        <i class="fa-brands fa-x-twitter"></i>
      </a>
      <a href="#" title="LinkedIn">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      <a href="#" title="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </div>
</body>
</html>
